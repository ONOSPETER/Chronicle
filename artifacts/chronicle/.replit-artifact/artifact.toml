kind = "web"
previewPath = "/"
title = "Chronicle"
version = "1.0.0"
id = "artifacts/chronicle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24621

[services.development]
run = "pnpm --filter @workspace/chronicle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chronicle", "run", "build" ]
publicDir = "artifacts/chronicle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24621"
BASE_PATH = "/"
